<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitebox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="Images/favicon/favicon-package/favicon.ico">
    <style>

        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .navigation {
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            width: 100%;
        }

        nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(0, 0, 0);
            padding: 15px 20px;
        }

        nav a:hover{
            color: red;
        }

        nav li:last-child a{
            background-color: red;
            padding: 6px 12px;
            border-radius: 5px;
        }

        nav li:last-child a:hover{
            background-color: black;
            color: red;
        }

        ul
        {
            display: flex;
            list-style: none;
            align-items: center;
            justify-content: space-between;
            margin-left: auto;
            gap: 40px;
        }

        hr {
            border: 0;
            border-top: 3px solid #333; 
            width: 100%;
            margin: 0;
            background-color: #1e1d1d;
        }
        
        .temp{
            color: red;
            font-weight: bold;
            border-bottom: 2px solid red;
            padding-bottom: 4px;
        }
        
        .foot{
            display: inline;
            margin: 150px;
        }
        
        img {
            display: inline-block;
            margin-right: 50px; 
            width: 180px;
        }

        section
        {
            background-color: beige;
            height: 600px;
        }


        footer
        {
            background-color: aliceblue;
            height: 200px;
        }

        nav a
        {
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            color: rgb(255, 255, 255);
        } 

        .tempdiv{
            height: 10px;
            background-color: black;
            
        }

    </style>
</head>
<body>
    <header style>
        <div class="tempdiv">
            <hr style="padding-top: 7px;">
        </div>
        <nav>
            <div class="navigation">
                <!-- <hr> -->
                <!-- <h1><span style="color: white;">Bite</span><span style="color:red;">box</span></h1> -->
                <img src="../bitebox/Images/bitebox logo.png" alt="Bitebox Logo">
                <ul>   
                    <li class="temp"><a href="./menu.html"><i class="fa-solid fa-bars"></i> Menu</a></li>
                    <li class="temp"><a href="./home.html"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li class="temp"><a href="./bitedeals.html"><i class="fa-solid fa-drumstick-bite"></i> BiteDeals</a></li>
                    <li class="temp"><a href="./cart.html"><i class="fa-solid fa-cart-arrow-down"></i> Cart</a></li>
                    <li class="temp"><a href="./login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</a></li>
                </ul>
                <!-- <hr> -->
            </div>
        </nav>
        <div class="tempdiv">
            <hr style="padding-bottom: 7px;">
        </div>
    </header>
    <section>
        <h2>Main Section</h2>
    </section>
    <footer>
        <ul>
            <li class="foot">About us</li>
            <li class="foot">Contact Us</li>
            <li class="foot">@copyright 2026 Bitebox</li>
        </ul> 
    </footer>
</body>
</html>
